name: Release

# Publish portable `cb` builds when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Each platform job builds the llvm-backend `cb` (interp + AOT in one binary),
# stages the relocatable runtime next to it (`cb --bundle-runtime`), archives the
# tree, and uploads it to the GitHub Release for the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create (or reuse) the Release for this tag before the build jobs attach
  # their assets. Idempotent so a re-run / second job never fails.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

  # Linux x86_64: system Allegro (apt, dynamic), LLVM 18 from apt. The produced
  # `cb` links Allegro dynamically and uses the system `cc` as the AOT link
  # driver, so the archive ships only `cb` + the CoolBasic runtime (no Allegro
  # libs, no clang) — see packaging/RELEASE-README-linux.md.
  linux:
    name: Release (Linux x86_64)
    runs-on: ubuntu-latest
    needs: create-release
    env:
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
      CB_RUNTIME_REQUIRE_ALLEGRO: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install Allegro 5 + LLVM 18 + CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            liballegro5-dev liballegro-acodec5-dev liballegro-audio5-dev \
            liballegro-image5-dev liballegro-ttf5-dev libfontconfig1-dev \
            llvm-18-dev libpolly-18-dev cmake

      - name: Build (release, llvm backend)
        run: cargo build -p cb-driver --release --features llvm --locked

      - name: Stage portable tree
        run: |
          DIST="cb-${GITHUB_REF_NAME}-x86_64-linux"
          mkdir -p "$DIST/docs"
          cp target/release/cb "$DIST/cb"
          ./target/release/cb --bundle-runtime "$DIST/lib"
          cp packaging/RELEASE-README-linux.md "$DIST/README.md"
          cp docs/cb_syntax.md docs/cb_runtime.md "$DIST/docs/"
          cp -r examples "$DIST/examples"
          tar -czf "${DIST}.tar.gz" "$DIST"
          echo "ASSET=${DIST}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber

  # Windows x64: vcpkg builds static Allegro + LLVM 18 (matching the dev recipe
  # in CLAUDE.md). The first run compiles LLVM from source (slow — ~1h+); vcpkg
  # binary caching into the GitHub Actions cache makes later runs fast. The
  # archive bundles `cb.exe` + the runtime + Allegro static libs + clang/lld +
  # the `xwin` fetch tool, so users need no Visual Studio / Windows SDK: a
  # one-time `cb --setup-toolchain` downloads the MS CRT + Windows SDK import libs
  # on their machine (only the VC++ Redistributable is needed to *run* output).
  # CI never splats the MS libs into the archive — only the MIT/Apache `xwin.exe`
  # ships. See packaging/RELEASE-README-windows.md.
  windows:
    name: Release (Windows x64)
    runs-on: windows-latest
    needs: create-release
    env:
      # Read-only `files` binary cache: a tag run can't write the master scope,
      # so it only consumes the cache the Windows LLVM workflow warmed on master.
      # If the warm is present and ABI-matching the LLVM/Allegro build is skipped;
      # otherwise this run rebuilds from source (slow) but stores nothing.
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,read"
      # Build vcpkg ports (LLVM, Allegro) release-only — half the build vs the
      # default debug+release. Applies to both the classic `vcpkg install llvm`
      # and the manifest Allegro build the cargo step drives through CMake.
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/runtime/vcpkg-triplets
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      # Restore (read-only) the vcpkg `files` binary cache the Windows LLVM
      # workflow warmed on master — actions/cache lets a tag run read the
      # default-branch scope. The restore-keys grab the most recent warm; the
      # key inputs match the warmer so the same archive resolves.
      - name: Restore vcpkg binary cache (read-only)
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-${{ hashFiles('runtime/vcpkg/ports/llvm/**', 'runtime/vcpkg-triplets/x64-windows-static-md.cmake', 'runtime/vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-${{ hashFiles('runtime/vcpkg/ports/llvm/**', 'runtime/vcpkg-triplets/x64-windows-static-md.cmake', 'runtime/vcpkg.json') }}-
            vcpkg-bincache-${{ runner.os }}-

      - name: Bootstrap vcpkg
        run: runtime\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        shell: cmd

      - name: Install LLVM 18 (vcpkg, static-md)
        run: runtime\vcpkg\vcpkg.exe install llvm:x64-windows-static-md
        shell: cmd

      - name: Set up llvm-sys prefix junction
        shell: pwsh
        run: |
          $inst = "runtime/vcpkg/installed/x64-windows-static-md"
          $prefix = "$inst/llvm-sys-prefix"
          New-Item -ItemType Directory -Force -Path $prefix | Out-Null
          if (-not (Test-Path "$prefix/bin")) {
            # New-Item -ItemType Junction requires an ABSOLUTE -Target; resolve it
            # (the LLVM install step above created $inst/tools/llvm).
            $target = (Resolve-Path "$inst/tools/llvm").Path
            New-Item -ItemType Junction -Path "$prefix/bin" -Target $target | Out-Null
          }
          "LLVM_SYS_181_PREFIX=$((Resolve-Path $prefix).Path)" >> $env:GITHUB_ENV

      - name: Build (release, llvm backend)
        run: cargo build -p cb-driver --release --features llvm --locked

      # The xwin fetch tool ships in the archive so users can download the MS
      # CRT/SDK import libs themselves (`cb --setup-toolchain`). Pinned for
      # reproducibility; cached by Swatinem/rust-cache. Only this MIT/Apache
      # binary is bundled — never the Microsoft content it downloads.
      - name: Build the xwin fetch tool
        run: cargo install xwin --version 0.9.0 --locked --root xwin-tool

      - name: Stage portable tree
        shell: pwsh
        run: |
          $dist = "cb-$($env:GITHUB_REF_NAME)-x64-windows"
          New-Item -ItemType Directory -Force -Path "$dist/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist/docs" | Out-Null
          Copy-Item target/release/cb.exe "$dist/cb.exe"
          ./target/release/cb.exe --bundle-runtime "$dist/lib"
          $llvmbin = Join-Path $env:LLVM_SYS_181_PREFIX "bin"
          Copy-Item (Join-Path $llvmbin "clang.exe") "$dist/bin/clang.exe"
          Copy-Item (Join-Path $llvmbin "lld-link.exe") "$dist/bin/lld-link.exe"
          Copy-Item xwin-tool/bin/xwin.exe "$dist/bin/xwin.exe"
          Copy-Item packaging/RELEASE-README-windows.md "$dist/README.md"
          Copy-Item docs/cb_syntax.md, docs/cb_runtime.md "$dist/docs/"
          Copy-Item -Recurse examples "$dist/examples"
          Compress-Archive -Path $dist -DestinationPath "$dist.zip"
          "ASSET=$dist.zip" >> $env:GITHUB_ENV

      - name: Upload asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload $env:GITHUB_REF_NAME $env:ASSET --clobber

  # Smoke-test the released archive on a clean Windows with NO Visual Studio /
  # Windows SDK — the one configuration neither a dev box nor the VS-equipped
  # build runner can prove. Runs in the FULL Windows base-image container (only
  # the VC++ Redist is added, needed to *run* cb.exe + produced exes): fetch the
  # import libs with `cb --setup-toolchain`, AOT-compile, and diff the native
  # output against the interpreter oracle. The actual test logic lives in
  # packaging/windows-no-sdk-smoke.ps1.
  #
  # Why the full `windows` image and not `servercore`: cb.exe links the full
  # Allegro runtime, so it load-imports the desktop graphics/audio DLLs (DSOUND,
  # gdiplus, OPENGL32, WINMM, …). Headless Server Core omits those, so the OS
  # loader fails cb.exe with STATUS_DLL_NOT_FOUND (0xC0000135) before its main
  # runs — a missing DLL has nothing to do with the VS/SDK this test isolates.
  # The full Windows base image carries the desktop DLL set while still shipping
  # no VS/SDK, which is exactly the environment this test needs.
  #
  # Host pinned to windows-2022 so the ltsc2022 image runs under fast process
  # isolation (the container base image must match the host build).
  windows-no-sdk-smoke:
    name: Smoke test (Windows, no VS/SDK)
    runs-on: windows-2022
    needs: windows
    steps:
      - uses: actions/checkout@v5 # for packaging/windows-no-sdk-smoke.ps1

      - name: Download the release archive
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download $env:GITHUB_REF_NAME --pattern "*x64-windows.zip" --dir .
          $zip = (Get-ChildItem *x64-windows.zip)[0].Name
          Expand-Archive -Path $zip -DestinationPath dist-extract
          $inner = (Get-ChildItem dist-extract -Directory)[0].FullName
          Copy-Item packaging/windows-no-sdk-smoke.ps1 (Join-Path $inner "smoke.ps1")
          "CB_DIST=$inner" >> $env:GITHUB_ENV

      - name: Run smoke test in a clean Windows container (no VS/SDK)
        shell: pwsh
        run: |
          docker run --rm -v "${env:CB_DIST}:C:\dist" `
            mcr.microsoft.com/windows:ltsc2022 `
            powershell -NoProfile -ExecutionPolicy Bypass -File C:\dist\smoke.ps1
