name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting gate. Fast, toolchain-only (no compile, no cache): fails the build
  # if any file isn't `cargo fmt`-clean. Runs first so style drift is caught
  # without waiting on the heavier build/test jobs.
  rustfmt:
    name: Rustfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # Proves FD-033: the workspace builds and the full test suite runs on Linux
  # with only a Rust toolchain + a C++ compiler — no CMake, vcpkg, or Allegro
  # SDK. CB_RUNTIME_FORCE_SDK_FREE makes build.rs skip the CMake/Allegro probe
  # and compile the Allegro-free runtime slice via the `cc` crate. Graphics /
  # input / audio fixtures gate on HAS_GRAPHICS and skip cleanly.
  linux-sdk-free:
    name: Linux SDK-free runtime (no Allegro)
    runs-on: ubuntu-latest
    env:
      CB_RUNTIME_FORCE_SDK_FREE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Test (workspace)
        run: cargo test --workspace --locked

      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Proves FD-047/FD-048: the opt-in LLVM backend links against a real LLVM 18
  # toolchain. This is one of two jobs that pull in inkwell/llvm-sys — keep the
  # `linux-sdk-free` job above LLVM-free (never add --all-features there). We
  # run `cargo test` (not just build) so the LLVM link is actually exercised:
  # a plain `cargo build` of the rlib compiles against inkwell but never links
  # LLVM, so it would not catch link breakage. The `codegen` feature pulls in
  # cb-runtime-sys, which builds the Allegro-free runtime slice via `cc` here (no
  # CMake/Allegro/vcpkg present), and the emit→link→run smoke links it.
  linux-llvm-smoke:
    name: Linux LLVM backend smoke (codegen feature)
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
      CB_RUNTIME_FORCE_SDK_FREE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Smoke test (llvm backend, codegen feature)
        run: cargo test -p cb-backend-llvm --features codegen --locked

  # Proves FD-049: the full AOT pipeline (IR → LLVM → native exe) matches the
  # interpreter. Builds the `cb` driver with the `llvm` feature and runs the
  # `diff_llvm` suite, which compiles each seed fixture to a native exe and
  # asserts its stdout + exit code equal `--backend interp` (the oracle). Uses
  # the Allegro-free runtime (CB_RUNTIME_FORCE_SDK_FREE) so no CMake/Allegro is
  # needed; the standalone exe links it through the platform `cc`. Keep the
  # default `linux-sdk-free` job LLVM-free — never fold this into it.
  linux-llvm-diff:
    name: Linux LLVM AOT diff vs interp (SDK-free)
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
      CB_RUNTIME_FORCE_SDK_FREE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Diff test (driver, llvm + interp backends)
        run: cargo test -p cb-driver --features llvm --locked

  # Windows build agent. Proves the workspace builds and the full suite passes on
  # Windows with only the MSVC toolchain — SDK-free, so no vcpkg/Allegro/LLVM and
  # no display. The full Allegro + LLVM Windows path (vcpkg) is heavy (LLVM builds
  # from source) and is exercised at release time instead (.github/workflows/release.yml).
  windows-sdk-free:
    name: Windows SDK-free build + tests
    runs-on: windows-latest
    env:
      CB_RUNTIME_FORCE_SDK_FREE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Test (workspace)
        run: cargo test --workspace --locked

      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Proves the full runtime against a *system* Allegro (Debian/Ubuntu
  # liballegro5-dev), linked dynamically via the pkg-config fallback in
  # runtime/CMakeLists.txt — the path a published Linux build uses. Builds the
  # llvm-backend `cb` (CB_RUNTIME_REQUIRE_ALLEGRO makes a missing Allegro fatal)
  # and runs a non-graphics AOT-vs-interp smoke (no display needed). Allegro
  # here comes from apt — fast, no vcpkg.
  linux-allegro:
    name: Linux full runtime (system Allegro) + AOT smoke
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
      CB_RUNTIME_REQUIRE_ALLEGRO: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install Allegro 5 + LLVM 18 + CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            liballegro5-dev liballegro-acodec5-dev liballegro-audio5-dev \
            liballegro-image5-dev liballegro-ttf5-dev libfontconfig1-dev \
            llvm-18-dev libpolly-18-dev cmake

      - name: Build cb (system Allegro, llvm backend)
        run: cargo build -p cb-driver --features llvm --locked

      - name: AOT vs interp smoke (no display)
        run: |
          printf 'Print "ALLEGRO_LINUX_OK"\nDim i\nFor i = 1 To 3\n    Print i * i\nNext i\n' > smoke.cb
          ./target/debug/cb --backend llvm smoke.cb -o smoke_aot
          out_aot="$(./smoke_aot)"
          out_interp="$(./target/debug/cb --backend interp smoke.cb)"
          echo "AOT:    $out_aot"
          echo "interp: $out_interp"
          test "$out_aot" = "$out_interp"
          echo "$out_aot" | grep -q ALLEGRO_LINUX_OK
