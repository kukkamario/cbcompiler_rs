name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Proves FD-033: the workspace builds and the full test suite runs on Linux
  # with only a Rust toolchain + a C++ compiler — no CMake, vcpkg, or Allegro
  # SDK. CB_RUNTIME_FORCE_SDK_FREE makes build.rs skip the CMake/Allegro probe
  # and compile the Allegro-free runtime slice via the `cc` crate. Graphics /
  # input / audio fixtures gate on HAS_GRAPHICS and skip cleanly.
  linux-sdk-free:
    name: Linux SDK-free runtime (no Allegro)
    runs-on: ubuntu-latest
    env:
      CB_RUNTIME_FORCE_SDK_FREE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Test (workspace)
        run: cargo test --workspace --locked

      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Proves FD-047: the opt-in LLVM backend links against a real LLVM 22
  # toolchain. This is the ONLY job that pulls in inkwell/llvm-sys — keep the
  # `linux-sdk-free` job above LLVM-free (never add --all-features there). We
  # run `cargo test` (not just build) so the LLVM link is actually exercised:
  # a plain `cargo build` of the rlib compiles against inkwell but never links
  # LLVM, so it would not catch link breakage. cb-backend-llvm does not depend
  # on cb-runtime-sys, so no CMake/Allegro/vcpkg is involved here.
  linux-llvm-smoke:
    name: Linux LLVM backend smoke (codegen feature)
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM 18
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev

      - name: Smoke test (llvm backend, codegen feature)
        run: cargo test -p cb-backend-llvm --features codegen --locked
